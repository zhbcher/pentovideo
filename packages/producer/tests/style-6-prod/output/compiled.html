    <title>Athletic Bold — Sport Broadcast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background: #000000;
        overflow: hidden;
      }
      #main-comp {
        width: 1920px;
        height: 1080px;
        position: relative;
      }
      #aroll-video {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        object-fit: cover;
        z-index: 1;
      }
      .composition-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #intro-comp {
        z-index: 2;
      }
      #stats-comp {
        z-index: 3;
      }
      #captions-comp {
        z-index: 4;
      }

      [data-composition-id="intro-anim"] {
        background-color: #000000;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "Oswald", "Bebas Neue", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      [data-composition-id="intro-anim"] .intro-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      [data-composition-id="intro-anim"] .wipe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #cdff00; /* Volt */
        transform: translateX(-100%);
        z-index: 1;
        opacity: 0.15; /* Subtle wipe that doesn't block text */
      }

      [data-composition-id="intro-anim"] .text-wrapper {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      [data-composition-id="intro-anim"] .line {
        font-size: 180px;
        font-weight: 900;
        line-height: 1.1;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: -2px;
        opacity: 0;
        /* Initial state for entrance */
        transform: translateY(50px) scale(1.2);
      }

      [data-composition-id="intro-anim"] .line-2 {
        color: #cdff00; /* Volt accent */
      }

      [data-composition-id="stats-graphics"] {
        font-family: "Oswald", "Bebas Neue", sans-serif;
        color: white;
        overflow: hidden;
        background: transparent;
        width: 1920px;
        height: 1080px;
        position: relative;
      }

      /* Sport Broadcast Style: Bold Condensed Uppercase */
      [data-composition-id="stats-graphics"] .stat-value,
      [data-composition-id="stats-graphics"] .stat-value-row {
        font-size: 280px;
        font-weight: 900;
        line-height: 0.8;
        letter-spacing: -10px;
        text-transform: uppercase;
        font-stretch: condensed;
        color: #cdff00; /* Volt */
        margin-bottom: 20px;
        filter: drop-shadow(10px 10px 0px rgba(0, 0, 0, 0.5));
      }

      /* 30px spacing between text layers in 3 out of 4 */
      [data-composition-id="stats-graphics"] .stat-value-row {
        display: flex;
        gap: 30px;
        align-items: baseline;
      }

      [data-composition-id="stats-graphics"] .stat-label {
        font-size: 60px;
        font-weight: 800;
        color: white;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: black;
        padding: 10px 30px;
        display: inline-block;
        transform: skewX(-10deg);
      }

      [data-composition-id="stats-graphics"] .stat-container {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        opacity: 0;
        pointer-events: none;
      }

      /* Positioning */
      [data-composition-id="stats-graphics"] .right-side {
        right: 100px;
        top: 50%;
        transform: translateY(-50%);
        align-items: flex-end;
        text-align: right;
      }

      [data-composition-id="stats-graphics"] .centered-margins {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        align-items: center;
        text-align: center;
        width: 100%;
      }

      [data-composition-id="stats-graphics"] .stat-value-row .white {
        color: white;
      }
      [data-composition-id="stats-graphics"] .stat-value-row .volt {
        color: #cdff00;
      }

      /* Diagonal Slashes */
      [data-composition-id="stats-graphics"] .bg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      [data-composition-id="stats-graphics"] .slash {
        position: absolute;
        background: rgba(205, 255, 0, 0.05);
        width: 150px;
        height: 200%;
        transform: rotate(25deg);
        top: -50%;
        filter: blur(40px);
      }

      [data-composition-id="stats-graphics"] .slash-1 {
        left: 20%;
      }
      [data-composition-id="stats-graphics"] .slash-2 {
        left: 50%;
      }
      [data-composition-id="stats-graphics"] .slash-3 {
        left: 80%;
      }

      [data-composition-id="stats-graphics"] .accent-bar {
        width: 100%;
        height: 15px;
        background: #cdff00;
        margin-top: 10px;
        transform: skewX(-10deg);
      }

      /* Video Reveal Bars */
      [data-composition-id="stats-graphics"] .video-reveal-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      [data-composition-id="stats-graphics"] .reveal-bar {
        position: absolute;
        left: 0;
        width: 100%;
        height: 50%;
        background: black;
        box-sizing: border-box;
      }

      [data-composition-id="stats-graphics"] .reveal-bar.top {
        top: 0;
        border-bottom: 4px solid #cdff00;
        box-shadow: 0 10px 30px rgba(205, 255, 0, 0.2);
      }
      [data-composition-id="stats-graphics"] .reveal-bar.bottom {
