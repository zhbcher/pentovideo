      body,

      #main-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;

      /* Paper texture and Grain overlay */
      #grain-overlay-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }

      /* Grain animation */
      @keyframes grain-noise {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-5%, -5%);
        }
        20% {
          transform: translate(-10%, 5%);
        }
        30% {
          transform: translate(5%, -10%);
        }
        40% {
          transform: translate(-5%, 15%);
        }
        50% {
          transform: translate(-10%, 5%);
        }
        60% {
          transform: translate(15%, 0);
        }
        70% {
          transform: translate(0, 10%);
        }
        80% {
          transform: translate(-15%, 0);
        }
        90% {
          transform: translate(10%, 5%);
        }
      }

      .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        opacity: 0.15;
        animation: grain-noise 0.5s steps(1) infinite;
      }

      #a-roll {
        position: absolute;
        border-radius: 16px;
        object-fit: cover;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);

        opacity: 0;

        position: relative;
        width: 1920px;
        height: 1080px;
        font-family: "Outfit", sans-serif;
        color: white;
        overflow: hidden;
      }

      [data-composition-id="graphics"] .moment {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        /* We'll use GSAP to handle the centering and drift */
      }

      [data-composition-id="graphics"] #moment-1 {
        width: 500px;
        height: 500px;

      [data-composition-id="graphics"] .stat-content {
