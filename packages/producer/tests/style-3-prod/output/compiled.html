    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiss Grid - Editor Agent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: #f2f2f2;
        overflow: hidden;
        font-family: "Helvetica", Arial, sans-serif;
      }

      #master-root {
        width: 1920px;
        height: 1080px;
        position: relative;
      }

      .background-grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* A-roll styling */
      #short_mag_cut_frame {
        position: absolute;
        border-radius: 8px; /* Required */
        z-index: 1;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        background: #000;
      }

      #short_mag_cut,
      #short_mag_cut_frame > img.__render_frame__,
      #short_mag_cut_frame > img.__preview_render_frame__ {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* Overlay layers */
      .overlay-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #intro-comp {
        z-index: 2;
      }
      #graphics-comp {
        z-index: 3;
      }
      #captions-comp {
        z-index: 4;
      }

      [data-composition-id="intro"] {
        background-color: #f5f5f5; /* Off-white */
        width: 1920px;
        height: 1080px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        overflow: hidden;
      }

      [data-composition-id="intro"] .container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 160px; /* Swiss grid alignment */
      }

      [data-composition-id="intro"] .grid-line {
        position: absolute;
        left: 160px;
        top: 50%;
        width: 0px;
        height: 12px;
        background-color: #0a1e3d; /* Navy */
        transform: translateY(-180px); /* Positioned above the text */
      }

      [data-composition-id="intro"] .text-wrapper {
        display: flex;
        flex-direction: column;
        gap: 0;
        overflow: hidden;
      }

      [data-composition-id="intro"] .title {
        color: #0a1e3d;
        font-size: 180px;
        font-weight: 900; /* Black weight */
        line-height: 0.9;
        margin: 0;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        transform: translateX(-100%); /* Start off-screen left */
      }

      [data-composition-id="intro"] .subtitle {
        color: #0a1e3d;
        font-size: 64px;
        font-weight: 300; /* Lighter weight for contrast */
        line-height: 1.2;
        margin: 0;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transform: translateX(-100%); /* Start off-screen left */
        margin-top: 20px;
      }

      [data-composition-id="graphics"] {
        font-family: "Helvetica", Arial, sans-serif;
        color: #0a1e3d;
        background: transparent;
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }

      [data-composition-id="graphics"] .grid-container {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: repeat(12, 1fr);
        width: 100%;
        height: 100%;
        padding: 80px;
        gap: 20px;
      }

      [data-composition-id="graphics"] .stat-group {
        opacity: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        background: #f2f2f2;
        padding: 40px;
        border-left: 10px solid #d4a017;
        box-shadow: 20px 20px 0px rgba(10, 30, 61, 0.1);
      }

      /* Positioning Stats on Grid - Adjusted for A-roll structure */
      [data-composition-id="graphics"] #stat1 {
        grid-column: 2 / 6;
        grid-row: 3 / 7;
      }

      [data-composition-id="graphics"] #stat2 {
        grid-column: 2 / 6;
        grid-row: 3 / 7;
      }

      [data-composition-id="graphics"] #stat3 {
        grid-column: 7 / 12;
        grid-row: 3 / 7;
      }

      [data-composition-id="graphics"] .stat-value {
        font-size: 140px;
        font-weight: 900;
        color: #d4a017;
        line-height: 0.8;
        margin-bottom: 15px;
      }

      [data-composition-id="graphics"] .stat-label {
        font-size: 24px;
        font-weight: 300; /* Lighter weight */
        color: #0a1e3d;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Progress Bar for Stat 2 */
      [data-composition-id="graphics"] .progress-container {
        width: 100%;
        height: 24px;
        background: #e0e0e0;
        margin-top: 30px;
        border: 2px solid #0a1e3d;
        position: relative;
      }

      [data-composition-id="graphics"] .progress-bar {
        width: 0%;
        height: 100%;
        background: #d4a017;
      }

      /* Grid Blocks for Stat 3 */
      [data-composition-id="graphics"] .grid-blocks {
        display: flex;
        gap: 20px;
        margin-top: 30px;
      }

      [data-composition-id="graphics"] .block {
        width: 80px;
        height: 80px;
        border: 3px solid #0a1e3d;
      }

      [data-composition-id="graphics"] .block.gold {
        background: #d4a017;
      }

      [data-composition-id="graphics"] .block.navy {
        background: #0a1e3d;
      }

      [data-composition-id="captions"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        font-family: "Helvetica", "Arial", sans-serif;
        font-weight: bold;
        overflow: hidden;
      }

      [data-composition-id="captions"] #caption-container {
        position: absolute;
        bottom: 120px; /* Consistent bottom positioning */
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
      }

      [data-composition-id="captions"] .caption-box {

              if (!TRANSCRIPT || TRANSCRIPT.length === 0) {

              // Group transcript into max 5 words per group
              const groups = [];
              let currentGroup = [];

              TRANSCRIPT.forEach((word, index) => {
                currentGroup.push(word);

                if (currentGroup.length === 5 || index === TRANSCRIPT.length - 1) {
                  groups.push([...currentGroup]);
                  currentGroup = [];

              // Create DOM elements and timeline for each group
              groups.forEach((group, i) => {
                const box = document.createElement("div");
                box.className = "caption-box";
                box.id = `group-${i}`;

                const text = document.createElement("div");
