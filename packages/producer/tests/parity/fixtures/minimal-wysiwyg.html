<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parity Fixture</title>
    <script data-pentovideo-preview-runtime="1" src="pentovideo.runtime.iife.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 640px;
        height: 360px;
        overflow: hidden;
        background: #0f172a;
      }

      #root {
        width: 640px;
        height: 360px;
        position: relative;
        overflow: hidden;
      }

      #animated-card {
        position: absolute;
        top: 80px;
        left: 180px;
        width: 280px;
        height: 200px;
        border-radius: 0px;
        background: linear-gradient(135deg, #06b6d4, #6366f1);
        animation: parity-card 2s linear both paused;
      }

      @keyframes parity-card {
        0% {
          border-radius: 0px;
          transform: translateX(0);
        }

        50% {
          border-radius: 48px;
          transform: translateX(50px);
        }

        100% {
          border-radius: 12px;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main-video"
      data-width="640"
      data-height="360"
      data-duration="2"
      data-fps="30"
    >
      <div id="animated-card" data-start="0"></div>
    </div>
  </body>
</html>
