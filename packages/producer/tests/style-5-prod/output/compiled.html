    <meta charset="UTF-8" />

    <title>Digital Grid — Wim Crouwel Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        background-color: #0a0a0a;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }

      #master-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
      }

      #aroll-video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1920px;
        height: 1080px;
        border-radius: 4px;
        object-fit: cover;
        clip-path: inset(0 100% 0 0); /* For left-to-right wipe */
      }

      [data-composition-id="grid-bg"] .bg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        background-color: #0a0a0a;
        overflow: hidden;
      }

      [data-composition-id="grid-bg"] .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* 40px grid pattern using linear-gradients */
