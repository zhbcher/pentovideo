<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Captions – Minimal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=block"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }

      #captions-minimal {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(180deg, #0c0e16 0%, #10121a 50%, #0c0e16 100%);
      }

      #captions-minimal::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 300px;
        background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        pointer-events: none;
      }

      .caption-group {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 500;
        font-size: 56px;
        line-height: 1.3;
        color: #ffffff;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        will-change: transform, opacity;
        font-variant-numeric: tabular-nums;
        /* Dark pill */
        background: rgba(0, 0, 0, 0.55);
        border-radius: 12px;
        padding: 16px 48px;
      }

      .driver {
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 1px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="captions-minimal"
      data-composition-id="captions-minimal"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="13"
      data-root="true"
    >
      <div class="driver" data-track-index="0"></div>
    </div>

    <script>
      (function () {
        var GROUPS = [
          { text: "Write HTML", start: 0.3, end: 1.8 },
          { text: "render video", start: 2.0, end: 3.5 },
          { text: "No timeline editors", start: 3.8, end: 5.5 },
          { text: "no After Effects", start: 5.7, end: 7.2 },
          { text: "Ship 10x faster", start: 7.5, end: 9.5 },
          { text: "with HyperFrames", start: 9.8, end: 12.0 },
        ];

        var root = document.getElementById("captions-minimal");

        // Build caption group elements
        GROUPS.forEach(function (group, gi) {
          var div = document.createElement("div");
          div.className = "caption-group";
          div.id = "cg-" + gi;
          div.textContent = group.text;
          root.appendChild(div);
        });

        // Build timeline
        var tl = gsap.timeline({ paused: true });

        GROUPS.forEach(function (group, gi) {
          var el = "#cg-" + gi;
          // Fade in with slight upward motion
          tl.set(el, { visibility: "visible" }, group.start);
          tl.from(el, { y: 15, opacity: 0, duration: 0.3, ease: "power2.out" }, group.start);
          // Fade out with slight upward drift
          tl.to(el, { y: -5, opacity: 0, duration: 0.2, ease: "power2.in" }, group.end - 0.2);
          tl.set(el, { opacity: 0, visibility: "hidden" }, group.end);
        });

        window.__timelines = window.__timelines || [];
        window.__timelines.push(tl);
      })();
    </script>
  </body>
</html>
