<!doctype html>
<html>
<head><meta charset="UTF-8"><title>PentoVideo Image Slides</title></head>
<body>
<div data-composition-id="image-slides" data-start="0" data-width="1920" data-height="1080">

<audio id="narration" data-start="0" data-duration="120" data-track-index="0" src="narration.mp3"></audio>

<div id="slides-container" class="clip" data-start="0" data-duration="120" data-track-index="1">
  <div class="slide" id="s1"><img src="slide-01.png" alt=""><div class="label">标题</div></div>
  <div class="slide" id="s2"><img src="slide-02.png" alt=""><div class="label">标题</div></div>
</div>

<div id="subtitle-container" class="subtitle-area"><span id="subtitle-text"></span></div>
<div class="progress-bar"><div class="progress-fill"></div></div>

<!-- transcript embedded -->
<script id="transcript-data" type="application/json">[]</script>

</div>

<style>
[data-composition-id="image-slides"] {
  width:1920px; height:1080px; background:#0a0a0f; position:relative; overflow:hidden;
  font-family:-apple-system,"PingFang SC",sans-serif; color:#fff;
}
.slide { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; }
.slide img { width:100%; height:100%; object-fit:cover; display:block; }
.label { position:absolute; top:32px; right:40px; background:rgba(0,0,0,0.65); backdrop-filter:blur(12px);
  font-size:22px; font-weight:600; padding:10px 24px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.12); }
.subtitle-area { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); z-index:50;
  background:rgba(0,0,0,0.6); padding:12px 32px; border-radius:8px; font-size:48px; }
.progress-bar { position:absolute; bottom:0; left:0; width:100%; height:4px; background:rgba(255,255,255,0.08); z-index:100; }
.progress-fill { height:100%; width:0; background:linear-gradient(90deg,#4da6ff,#7dbfff); border-radius:0 2px 2px 0; }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });
const totalDuration = 120;
tl.to(".progress-fill", { width:"100%", duration:totalDuration, ease:"none" }, 0);
window.__timelines["image-slides"] = tl;
</script>

</body>
</html>
