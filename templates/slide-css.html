<!doctype html>
<html>
<head><meta charset="UTF-8"><title>PentoVideo CSS Slides</title></head>
<body>
<div data-composition-id="css-slides" data-start="0" data-width="1920" data-height="1080">

<audio id="narration" data-start="0" data-duration="60" data-track-index="0" src="narration.mp3"></audio>

<div id="slides-container" class="clip" data-start="0" data-duration="60" data-track-index="1">
  <!-- 逐页添加 .scene -->
  <div class="scene" id="s1">
    <div class="scene-content">
      <h1 class="title">标题</h1>
      <p class="subtitle">副标题</p>
    </div>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill"></div></div>

</div>

<style>
[data-composition-id="css-slides"] {
  width:1920px; height:1080px; background:radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a15 70%);
  position:relative; overflow:hidden; font-family:-apple-system,"PingFang SC",sans-serif; color:#fff;
}
.scene { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; }
.scene-content { display:flex; flex-direction:column; justify-content:center; width:100%; height:100%; padding:120px 160px; gap:24px; box-sizing:border-box; }
.title { font-size:96px; font-weight:800; line-height:1.1; margin:0; }
.subtitle { font-size:36px; opacity:0.7; margin:0; }
.progress-bar { position:absolute; bottom:0; left:0; width:100%; height:4px; background:rgba(255,255,255,0.08); z-index:100; }
.progress-fill { height:100%; width:0; background:linear-gradient(90deg,#4da6ff,#7dbfff); border-radius:0 2px 2px 0; }
</style>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });
tl.from("#s1 .title", { y:50, opacity:0, duration:0.7, ease:"power3.out" }, 0.3);
tl.from("#s1 .subtitle", { y:30, opacity:0, duration:0.5, ease:"power2.out" }, 0.6);
tl.to(".progress-fill", { width:"100%", duration:60, ease:"none" }, 0);
window.__timelines["css-slides"] = tl;
</script>

</body>
</html>
