name: Feature Request
description: Suggest an idea for Pentovideo
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please search [existing issues](https://github.com/heygen-com/pentovideo/issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include code examples or mockups if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or examples.
