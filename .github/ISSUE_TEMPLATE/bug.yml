name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Before filing, please:
        - Search [existing issues](https://github.com/heygen-com/pentovideo/issues) to avoid duplicates
        - Make sure the issue reproduces without custom extensions or plugins
        - Test on the latest version (`npx pentovideo upgrade`)

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: input
    id: reproduction-link
    attributes:
      label: Link to reproduction
      description: |
        A link to a **public** GitHub repository with a minimal reproduction of the issue.

        Start from a clean project with `npx pentovideo init repro --non-interactive --example blank`, make only the changes needed to demonstrate the bug, push to a public repo, and paste the link here.

        **Issues without a minimal reproduction may be closed.** A reproduction helps us diagnose and fix your issue faster — often in hours instead of days.
      placeholder: "https://github.com/username/my-pentovideo-repro"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions using the linked reproduction.
      placeholder: |
        1. Clone the repo above
        2. Run `npx pentovideo render`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `npx pentovideo doctor` and paste the output here.
      render: shell
      placeholder: |
        ✓ Version          0.x.x (latest)
        ✓ Node.js          v22.x.x (darwin arm64)
        ✓ FFmpeg           ffmpeg version 7.x ...
        ✓ Chrome           bundled: /path/to/chrome
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
